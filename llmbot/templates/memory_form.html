{% extends "base.html" %}
{% block title %}{{ "Edit" if memory else "New" }} Memory — llmbot admin{% endblock %}
{% block content %}
<h1>{{ "Edit" if memory else "New" }} Memory</h1>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="{{ '/memories/' ~ memory.id ~ '/edit' if memory else '/memories/new' }}">
  {% if not memory %}
  <div class="mb-3">
    <label for="user_id" class="form-label">User ID (Discord snowflake)</label>
    <input type="text" class="form-control" id="user_id" name="user_id" required>
  </div>
  {% endif %}

  <div class="mb-3">
    <label for="content" class="form-label">Content</label>
    <textarea class="form-control" id="content" name="content" rows="3" required>{{ memory.content if memory else "" }}</textarea>
  </div>

  <div class="mb-3">
    <label for="tags" class="form-label">Tags (comma-separated)</label>
    <input type="text" class="form-control" id="tags" name="tags"
           value="{{ memory.tags|join(', ') if memory else '' }}">
  </div>

  <div class="mb-3">
    <label for="category" class="form-label">Category</label>
    <select class="form-select" id="category" name="category">
      {% for cat in categories %}
      <option value="{{ cat }}" {{ "selected" if memory and memory.category == cat else "" }}>{{ cat }}</option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Save</button>
  <a href="/memories" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
