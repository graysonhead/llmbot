[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-caldav.*]
ignore_missing_imports = True

[mypy-icalendar.*]
ignore_missing_imports = True

[mypy-click.*]
ignore_missing_imports = True

[mypy-discord.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-nox.*]
ignore_missing_imports = True

[mypy-ollama.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-google.auth.*]
ignore_missing_imports = True

[mypy-google.oauth2.*]
ignore_missing_imports = True

[mypy-google_auth_oauthlib.*]
ignore_missing_imports = True

[mypy-urllib3.*]
ignore_missing_imports = True

[mypy-tests.test_tools]
ignore_errors = True